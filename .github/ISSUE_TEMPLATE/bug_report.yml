name: Bug Report
description: Report a bug in AIUsage.NET
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open AIUsage
        2. Go to ...
        3. Click on ...
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AIUsage.NET Version
      description: Which version are you running?
      placeholder: "e.g. 0.1.0"
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows Version
      description: AIUsage.NET requires Windows 10 or later with .NET 8.
      placeholder: "e.g. Windows 11 23H2"
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, drag and drop or paste screenshots here.
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might be helpful (e.g. relevant lines from %LOCALAPPDATA%\AIUsage\Logs\AIUsage.log).
